name: Build & Deploy FrendPro

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build -- --configuration production --base-href /frendpro/

      - name: Create SPA .htaccess
        run: |
          printf '<IfModule mod_rewrite.c>\n  RewriteEngine On\n  RewriteBase /\n  RewriteRule ^index\\.html$ - [L]\n  RewriteCond %%{REQUEST_FILENAME} !-f\n  RewriteCond %%{REQUEST_FILENAME} !-d\n  RewriteRule . /index.html [L]\n</IfModule>\n' > www/.htaccess

      - name: Package dist
        run: tar -czf frendpro-dist.tar.gz -C www .

      - name: Configurar SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Copiar dist al VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          scp -i ~/.ssh/deploy_key frendpro-dist.tar.gz root@$VPS_HOST:/tmp/frendpro-dist.tar.gz

      - name: Deploy en contenedor frendpro
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key root@$VPS_HOST '
            mkdir -p /tmp/frendpro_build
            tar -xzf /tmp/frendpro-dist.tar.gz -C /tmp/frendpro_build
            docker exec frendpro sh -c "rm -rf /usr/local/apache2/htdocs/*"
            docker cp /tmp/frendpro_build/. frendpro:/usr/local/apache2/htdocs/
            docker exec frendpro sed -i "s/#LoadModule rewrite_module/LoadModule rewrite_module/" /usr/local/apache2/conf/httpd.conf
            docker exec frendpro sed -i "s/AllowOverride None/AllowOverride All/g" /usr/local/apache2/conf/httpd.conf
            docker exec frendpro httpd -k graceful
            rm -rf /tmp/frendpro_build /tmp/frendpro-dist.tar.gz
            echo "FrendPro desplegado OK"
          '
